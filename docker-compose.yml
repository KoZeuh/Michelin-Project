services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile-production
    container_name: app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: '0.0.0.0'
      PORT: '3001'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    command: sh -c "node ace migration:run --force && node bin/server.js"
    depends_on:
      - redis
    volumes:
      - app_sqlite:/app/tmp
      - app_uploads:/app/storage/uploads
    networks:
      - app_network
    expose:
      - '3001'

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network
      - services

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --requirepass
      - redis_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app_network

volumes:
  app_sqlite:
    driver: local
  app_uploads:
    driver: local
  redis_data:
    driver: local

networks:
  app_network:
    driver: bridge
  services:
    external: true
